name: E2E + Accessibility

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'src/server/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright + axe-core
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:15.5-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci-test-password
          POSTGRES_DB: inzyts
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s

    env:
      JWT_SECRET_KEY: ci-jwt-secret-not-real
      ADMIN_PASSWORD: ci-admin-password-not-real
      ADMIN_USERNAME: admin
      INZYTS__DB__HOST: localhost
      INZYTS__DB__USER: postgres
      INZYTS__DB__PASSWORD: ci-test-password
      INZYTS__DB__DB: inzyts
      REDIS_URL: redis://localhost:6379/0
      INZYTS_NETWORK_ISOLATION: "off"
      # The auth-only flow doesn't need real LLM creds — gate the test suite
      # so it skips analysis paths that would call out.
      INZYTS__LLM__DEFAULT_PROVIDER: anthropic
      INZYTS__LLM__ANTHROPIC_API_KEY: dummy

    steps:
      - uses: actions/checkout@v4

      # ---- Backend ----
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagic1 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libcairo2
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Migrate DB
        run: alembic upgrade head

      - name: Start backend
        run: |
          uvicorn src.server.main:app --host 0.0.0.0 --port 8000 &
          # Wait up to 60s for /health to respond.
          for i in $(seq 1 60); do
            if curl -fs http://localhost:8000/health >/dev/null; then
              echo "Backend up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "Backend did not become ready"; exit 1

      # ---- Frontend ----
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start frontend dev server
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: |
          npm run dev -- --host 0.0.0.0 &
          for i in $(seq 1 60); do
            if curl -fs http://localhost:5173 >/dev/null; then
              echo "Frontend up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "Frontend did not become ready"; exit 1

      # ---- Tests ----
      - name: Run Playwright e2e
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          PLAYWRIGHT_ADMIN_USERNAME: admin
          PLAYWRIGHT_ADMIN_PASSWORD: ${{ env.ADMIN_PASSWORD }}
        run: npx playwright test tests/e2e

      - name: Run Playwright accessibility (axe-core)
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          PLAYWRIGHT_ADMIN_USERNAME: admin
          PLAYWRIGHT_ADMIN_PASSWORD: ${{ env.ADMIN_PASSWORD }}
        # Allow a11y to fail without breaking the build for now (warn-only
        # while we triage existing violations). Drop ``continue-on-error``
        # once the baseline is clean.
        continue-on-error: true
        run: npx playwright test tests/a11y

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
