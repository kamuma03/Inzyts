[pytest]
pythonpath = .
testpaths = tests
cache_dir = .cache/pytest
# Default: skip integration / e2e / UI suites AND the `slow` marker.
# `slow` covers tests that spawn real Jupyter kernels (test_sandbox_security.py).
# Those exercise setrlimit / setsid / killpg machinery on real subprocesses —
# a failed setsid in the child historically caused os.killpg() to SIGKILL the
# *parent* process group, which can take the test runner / shell / terminal /
# desktop session down with it. Opt in explicitly with `pytest -m slow` only
# after reading the safety guarantees in src/services/sandbox_executor.py.
addopts = --ignore=tests/ui --ignore=tests/integration --ignore=tests/e2e -m "not slow"
markers =
    requires_redis: tests that need a running Redis instance
    requires_db: tests that need a real PostgreSQL database (via testcontainers)
    slow: tests that spawn real Jupyter kernels — opt in with `pytest -m slow`
