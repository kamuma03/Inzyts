; Mutation-testing configuration for ``mutmut``.
;
; Targets only the smallest, security-critical helpers — running mutmut
; over the whole codebase would take hours and produce a low signal-to-
; noise ratio. Each module here is short, has high test coverage, and
; sits on a regression-protected security boundary.
;
; Run with:
;     mutmut run
;
; View results:
;     mutmut results
;     mutmut show <id>     # show the surviving mutant
;
; Targets and rationale:
;   src/utils/db_utils.py         — SQL guard + db_uri host blocklist (H-2 + M-7)
;   src/utils/path_validator.py   — path-traversal guard (every file route relies on it)
;   src/server/middleware/auth.py — JWT decode + role hierarchy
;   src/agents/api_agent.py       — _is_private_ip + _safe_get redirect cap (H-1)
;
; ``runner`` is the command mutmut runs against each mutant. Keep it fast
; — the unit subset for these modules takes seconds, not minutes.

; ============================================================================
; Mutation testing (mutmut 2.5.1)
; ============================================================================
; mutmut 2.x mutates source files in-place (NOT in a copy), so the runner
; just executes ``pytest`` against a small set of fast, security-focused
; tests for each mutant. A mutant is "killed" if any test fails; "survived"
; if all tests pass with the mutation in place — survivors indicate gaps.
;
; Targets are intentionally narrow — the smallest, security-critical helpers:
;   src/utils/db_utils.py         — SQL guard + db_uri host block (H-2 + M-7)
;   src/utils/path_validator.py   — path-traversal guard (M-6)
;   src/server/middleware/auth.py — JWT decode + role hierarchy
;   src/agents/api_agent.py       — _is_private_ip + _safe_get redirect cap (H-1)
;
; Run:  rm -rf .mutmut-cache && JWT_SECRET_KEY=test-secret ADMIN_PASSWORD=test-admin mutmut run --paths-to-mutate src/utils/db_utils.py
; View: mutmut results
; Show: mutmut show <mutant_id>
;
; Last recorded mutation score (path_validator.py): 17/26 = 65% killed.
; The 9 surviving mutants are predominantly string-content mutations
; (e.g. error-message ``"foo"`` → ``"XXfooXX"``) which mutmut produces
; for every string literal — pinning exact wording in tests is rarely
; worth the maintenance cost. The genuine logic mutants (and/or flips,
; default-value flips, parents=True/False) are all killed by
; tests/unit/utils/test_path_validator.py.

[mutmut]
paths_to_mutate=src/utils/db_utils.py,src/utils/path_validator.py,src/server/middleware/auth.py,src/agents/api_agent.py
; The runner runs the full security/regression suite for each mutant. We use
; ``-x -q`` so the FIRST failure kills the mutant immediately — the typical
; killing test runs in <1s for these helpers, so a full run finishes in
; reasonable wall time.
runner=env JWT_SECRET_KEY=test-secret ADMIN_PASSWORD=test-admin pytest -x -q --tb=no -p no:cacheprovider --override-ini=addopts= tests/unit/utils/ tests/unit/server/middleware/ tests/security/ tests/safety/ tests/integration/test_ssrf_redirects.py
tests_dir=tests/
