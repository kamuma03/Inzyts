; Mutation-testing configuration for ``mutmut``.
;
; Targets only the smallest, security-critical helpers — running mutmut
; over the whole codebase would take hours and produce a low signal-to-
; noise ratio. Each module here is short, has high test coverage, and
; sits on a regression-protected security boundary.
;
; Run with:
;     mutmut run
;
; View results:
;     mutmut results
;     mutmut show <id>     # show the surviving mutant
;
; Targets and rationale:
;   src/utils/db_utils.py         — SQL guard + db_uri host blocklist (H-2 + M-7)
;   src/utils/path_validator.py   — path-traversal guard (every file route relies on it)
;   src/server/middleware/auth.py — JWT decode + role hierarchy
;   src/agents/api_agent.py       — _is_private_ip + _safe_get redirect cap (H-1)
;
; ``runner`` is the command mutmut runs against each mutant. Keep it fast
; — the unit subset for these modules takes seconds, not minutes.

; ============================================================================
; Mutation testing config (mutmut 3.x)
; ============================================================================
; KNOWN LIMITATION: mutmut 3.x copies the project into ``mutants/`` but copies
; tests as well, then runs pytest's default discovery on the mutants tree.
; That tree lacks ``src`` on its import path, so any test that does
; ``from src.X import ...`` fails to collect. Resolving this needs either:
;   (1) a per-mutmut-mutant pytest.ini that pins testpaths to the project
;       root, OR
;   (2) running mutmut with ``--unmutated-paths`` set so tests aren't
;       copied. The flag was added in mutmut 3.6 and isn't well documented.
;
; The mutation suite is therefore parked behind explicit operator action.
; Mutation score for the targets below will be gathered in CI investment
; work — meanwhile the targets are protected by:
;   * tests/unit/utils/test_db_uri_host_block.py (17 cases)
;   * tests/security/test_input_validation.py (15 cases)
;   * tests/integration/test_ssrf_redirects.py (7 cases incl. real HTTP)
;   * tests/unit/server/middleware/test_rbac.py + test_auth.py
;
; To attempt the run anyway:
;   rm -rf mutants/ && JWT_SECRET_KEY=test-secret ADMIN_PASSWORD=test-admin mutmut run

[mutmut]
paths_to_mutate=src/utils/db_utils.py,src/utils/path_validator.py,src/server/middleware/auth.py,src/agents/api_agent.py
runner=env PYTHONPATH=/home/mukan/Documents/Inzyts/mutants:/home/mukan/Documents/Inzyts JWT_SECRET_KEY=test-secret ADMIN_PASSWORD=test-admin pytest -x -q --tb=no -p no:cacheprovider --rootdir=/home/mukan/Documents/Inzyts /home/mukan/Documents/Inzyts/tests/unit/utils/ /home/mukan/Documents/Inzyts/tests/unit/server/middleware/ /home/mukan/Documents/Inzyts/tests/security/test_input_validation.py
tests_dir=tests/
